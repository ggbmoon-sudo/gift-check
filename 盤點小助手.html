<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>禮品盤點 moon v2.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* iOS 原生配色與變數 */
        :root { 
            --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --ios-blue: #007AFF; 
            --ios-green: #34C759; --ios-purple: #AF52DE; --ios-red: #FF3B30;
            --ios-text: #1C1C1E; --ios-gray: #8E8E93; --ios-light-gray: #E5E5EA;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            background-color: var(--ios-bg); color: var(--ios-text); 
            margin: 0; padding: 0; padding-bottom: calc(100px + var(--safe-bottom)); 
        }

        /* 頂部 Header */
        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(242, 242, 247, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: calc(10px + var(--safe-top)) 16px 10px;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        .header-title { font-size: 28px; font-weight: 700; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        
        .dashboard {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--ios-card); border-radius: 14px; padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .total-box { display: flex; flex-direction: column; }
        .total-label { font-size: 12px; color: var(--ios-gray); font-weight: 500; text-transform: uppercase; }
        .total-val { font-size: 22px; font-weight: 700; color: var(--ios-blue); }
        .sync-group { display: flex; gap: 8px; }
        .sync-icon-btn {
            background: var(--ios-light-gray); color: var(--ios-text); border: none; border-radius: 50%;
            width: 36px; height: 36px; font-size: 16px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.1s;
        }
        .sync-icon-btn:active { transform: scale(0.9); background: #D1D1D6; }
        #syncStatus { font-size: 11px; color: var(--ios-gray); text-align: right; margin-top: 4px; }

        .container { padding: 16px; }
        .search-bar {
            width: 100%; padding: 10px 14px 10px 36px;
            background: #E3E3E8 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%238E8E93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 10px center;
            border: none; border-radius: 10px; font-size: 17px; margin-bottom: 16px; outline: none;
        }

        /* 桌機專屬控制列 (手機隱藏) */
        .desktop-only { display: none !important; }

        /* ========================================= */
        /* CSS Grid 變形卡片/表格系統 */
        /* ========================================= */
        #inventoryList { display: flex; flex-direction: column; gap: 12px; }
        
        .ios-card {
            background: var(--ios-card); border-radius: 16px; padding: 16px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05); transition: background 0.2s;
            /* 手機版 Grid 佈局 */
            display: grid;
            grid-template-areas: 
                "area actions"
                "name name"
                "price stepper"
                "total stepper";
            grid-template-columns: 1fr auto;
            gap: 8px;
        }
        .highlight-card { background-color: #F8FDE8 !important; transition: 0.5s; }
        
        /* 區塊分配 */
        .item-area-cat { grid-area: area; }
        .item-actions { grid-area: actions; display: flex; gap: 15px; justify-content: flex-end; align-items: flex-start; }
        .item-name-sku { grid-area: name; }
        .item-price-unit { grid-area: price; align-self: end; }
        .item-total { grid-area: total; }
        .stepper-container { grid-area: stepper; justify-self: end; align-self: center; }

        /* 內容樣式 */
        .item-name { font-size: 17px; font-weight: 600; margin: 0 0 4px 0; line-height: 1.3; }
        .item-sku { font-size: 13px; color: var(--ios-gray); margin: 0; }
        .tag-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
        .tag-area { background: #E5F0FF; color: #007AFF; }
        .tag-cat { background: #E8F5E9; color: #34C759; }
        .price-info { font-size: 15px; font-weight: 500; }
        .total-price-text { font-size: 12px; color: var(--ios-gray); display: block; }
        
        .stepper { display: flex; align-items: center; background: var(--ios-light-gray); border-radius: 8px; overflow: hidden; }
        .stepper-btn { background: none; border: none; font-size: 20px; font-weight: 400; color: var(--ios-blue); width: 36px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .stepper-btn:active { background: #D1D1D6; }
        .qty-input { width: 44px; height: 32px; border: none; background: none; text-align: center; font-size: 16px; font-weight: 600; padding: 0; }
        .unit-text { font-size: 13px; color: var(--ios-gray); margin-left: 6px; }

        .edit-btn { background: none; border: none; color: var(--ios-blue); font-size: 18px; padding: 0; cursor: pointer; }
        .delete-btn { background: none; border: none; color: var(--ios-red); font-size: 20px; padding: 0; cursor: pointer; }

        /* ========================================= */
        /* 桌面版大螢幕樣式 (Table Mode) */
        /* ========================================= */
        @media (min-width: 1024px) {
            body { max-width: 1200px; margin: auto; padding-bottom: 20px; }
            .sticky-header { padding-top: 20px; border-radius: 0 0 16px 16px; margin-bottom: 20px;}
            
            /* 隱藏手機底部導覽列，顯示桌面控制列 */
            .bottom-nav { display: none !important; }
            .desktop-only { display: flex !important; }
            
            .desktop-toolbar { gap: 15px; margin-bottom: 15px; }
            .desktop-toolbar .action-btn { margin-top: 0; padding: 12px 24px; width: auto; }

            /* 表頭設計 */
            .list-header-row {
                display: grid !important;
                grid-template-columns: 15% 30% 10% 20% 15% 10%;
                padding: 10px 16px; font-weight: bold; color: var(--ios-gray); 
                border-bottom: 2px solid #ddd; margin-bottom: 10px;
            }

            /* 將卡片變形成表格列 */
            #inventoryList { gap: 0; }
            .ios-card {
                grid-template-areas: "area name price stepper total actions";
                grid-template-columns: 15% 30% 10% 20% 15% 10%;
                align-items: center;
                border-radius: 0; padding: 12px 16px; margin-bottom: 0;
                box-shadow: none; border-bottom: 1px solid #eee;
            }
            .ios-card:hover { background: #f9f9f9; }
            .item-actions { align-items: center; }
            .item-price-unit { align-self: center; }
            .item-total { align-self: center; }
            .stepper-container { justify-self: start; }
        }

        /* 模態視窗與表單 (維持原本精美設計) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; justify-content: center;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--ios-bg); width: 100%; max-width: 600px; border-radius: 20px 20px 0 0;
            padding: 20px 16px calc(20px + var(--safe-bottom));
            max-height: 90vh; overflow-y: auto; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            animation: slideUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @media (min-width: 1024px) { .modal-content { border-radius: 20px; margin-bottom: 5vh; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-size: 20px; font-weight: 700; margin: 0; }
        .close-btn { background: var(--ios-light-gray); border: none; border-radius: 16px; padding: 6px 12px; font-weight: 600; color: var(--ios-text); font-size: 14px; cursor: pointer; }

        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 13px; color: var(--ios-gray); margin-bottom: 6px; margin-left: 4px; }
        .ios-input, .ios-select { width: 100%; padding: 14px; background: var(--ios-card); border: 1px solid #D1D1D6; border-radius: 12px; font-size: 16px; outline: none; -webkit-appearance: none; }
        .form-row { display: flex; gap: 10px; }

        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; color: white; cursor: pointer; text-align: center; display: block; margin-top: 10px; }
        .btn-primary { background: var(--ios-blue); }
        .btn-ai { background: linear-gradient(135deg, #AF52DE, #5E5CE6); }
        .btn-success { background: var(--ios-green); }

        #reader, #skuReader { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 15px; background: black; }
        #aiCameraBox { text-align: center; }
        #aiVideo { width: 100%; border-radius: 16px; background: #000; margin-bottom: 15px; }
        #aiCanvas { display: none; }
        #aiLoading { display: none; color: var(--ios-purple); font-weight: 600; margin-top: 15px; }

        /* 手機底部導覽列 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 0.5px solid rgba(0,0,0,0.1); padding: 10px 16px calc(10px + var(--safe-bottom));
            display: flex; justify-content: space-around; gap: 12px; z-index: 100;
        }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: var(--ios-gray); font-size: 11px; font-weight: 500; gap: 4px; cursor: pointer; }
        .nav-btn .icon { font-size: 24px; line-height: 1; margin-bottom: 2px; }
        .nav-btn.scan { color: var(--ios-blue); }
        .nav-btn.ai { color: var(--ios-purple); }
        .nav-btn.add { color: var(--ios-green); }
        .settings-btn { margin-top: 30px; background: none; border: none; color: var(--ios-gray); width: 100%; text-align: center; font-size: 14px; padding: 10px; text-decoration: underline; cursor: pointer;}
    </style>
</head>
<body>

<div class="sticky-header">
    <h1 class="header-title">盤點助手 moon 2.1</h1>
    <div class="dashboard">
        <div class="total-box">
            <span class="total-label">資產總值</span>
            <span class="total-val" id="grandTotal">$0</span>
        </div>
        <div>
            <div class="sync-group">
                <button class="sync-icon-btn" onclick="downloadFromCloud()" title="從雲端下載最新資料">⬇️</button>
                <button class="sync-icon-btn" style="color: var(--ios-green);" onclick="uploadToCloud()" title="安全上傳至雲端">⬆️</button>
            </div>
            <div id="syncStatus">尚未同步</div>
        </div>
    </div>
</div>

<div class="container">
    
    <div class="desktop-toolbar desktop-only">
        <button class="action-btn btn-primary" onclick="openModal('scannerModal'); toggleScanner();">📷 條碼盤點</button>
        <button class="action-btn btn-ai" onclick="openModal('aiModal'); toggleAICamera();">✨ AI 視覺建檔</button>
        <button class="action-btn btn-success" onclick="openModal('addModal')">➕ 手動新增</button>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="搜尋名稱、SKU 或區域..." onkeyup="renderList()">
    
    <div class="list-header-row desktop-only">
        <div>區域 / 分類</div>
        <div>品名 / SKU</div>
        <div>單價</div>
        <div>實盤數量</div>
        <div>總計</div>
        <div style="text-align: right;">操作</div>
    </div>

    <div id="inventoryList"></div>
    
    <button class="settings-btn" onclick="exportToExcel()">匯出 Excel 報表</button>
    <button class="settings-btn" style="color:var(--ios-red); margin-top:5px;" onclick="confirmClear()">清空本機資料</button>
</div>

<div class="bottom-nav">
    <button class="nav-btn scan" onclick="openModal('scannerModal'); toggleScanner();">
        <span class="icon">📷</span><span>條碼盤點</span>
    </button>
    <button class="nav-btn ai" onclick="openModal('aiModal'); toggleAICamera();">
        <span class="icon">✨</span><span>AI 視覺</span>
    </button>
    <button class="nav-btn add" onclick="openModal('addModal')">
        <span class="icon">➕</span><span>手動建檔</span>
    </button>
</div>

<div id="scannerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">條碼盤點</h2>
            <button class="close-btn" onclick="closeModal('scannerModal'); if(isScanning) toggleScanner();">關閉</button>
        </div>
        <div id="reader"></div>
        <p style="text-align:center; color:var(--ios-gray); font-size:13px;">將條碼置於框內即可自動 +1</p>
    </div>
</div>

<div id="aiModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">✨ AI 視覺助手</h2>
            <button class="close-btn" onclick="closeModal('aiModal'); if(document.getElementById('aiCameraBox').style.display === 'block') toggleAICamera();">關閉</button>
        </div>
        <div id="aiCameraBox">
            <video id="aiVideo" autoplay playsinline></video>
            <canvas id="aiCanvas"></canvas>
            <div style="display:flex; gap:10px;">
                <button class="action-btn btn-ai" style="flex:1" onclick="captureAndAnalyze('count')">🔍 找舊貨 +1</button>
                <button class="action-btn btn-success" style="flex:1" onclick="captureAndAnalyze('add')">📝 智能建檔</button>
            </div>
            <div id="aiLoading">⏳ AI 正在思考中... (3-5秒)</div>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">新增禮品</h2>
            <button class="close-btn" onclick="closeModal('addModal')">取消</button>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label class="form-label">SKU 編號</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="newSKU" class="ios-input" placeholder="掃描或輸入">
                    <button class="sync-icon-btn" style="background:var(--ios-green); color:white; border-radius:12px; width:48px; height:48px;" onclick="toggleSkuScanner()">📷</button>
                </div>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">區域</label>
                <input type="text" id="newArea" class="ios-input" placeholder="例: A-01">
            </div>
        </div>
        <div id="skuReader" style="display:none;"></div>
        <div class="form-group">
            <label class="form-label">產品名稱 (必填)</label>
            <input type="text" id="newName" class="ios-input" placeholder="請輸入完整名稱">
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">分類</label>
                <select id="catSelect" class="ios-select" onchange="checkCustomCat('catSelect', 'customCat')">
                    <option value="HAMPER類(cheap餅)">HAMPER(cheap餅)</option>
                    <option value="HAMPER類(朱古力,餅乾)">HAMPER(朱古力)</option>
                    <option value="BB野">BB野</option>
                    <option value="籃">籃</option>
                    <option value="ESG">ESG</option>
                    <option value="酒">酒</option>
                    <option value="果汁">果汁</option>
                    <option value="永生花">永生花</option>
                    <option value="custom">自定義...</option>
                </select>
                <input type="text" id="customCat" class="ios-input" placeholder="輸入新分類" style="display:none; margin-top:8px;">
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">單位</label>
                <select id="unitSelect" class="ios-select">
                    <option value="件" selected>件</option>
                    <option value="箱">箱</option>
                    <option value="樽">樽</option>
                    <option value="套">套</option>
                    <option value="其他">其他</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">單價 ($)</label>
                <input type="number" id="newPrice" class="ios-input" placeholder="0" inputmode="decimal">
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">初始實盤數量</label>
                <input type="number" id="newBook" class="ios-input" placeholder="0" inputmode="numeric">
            </div>
        </div>
        <button class="action-btn btn-primary" onclick="addItem()">加入清單</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">修改資料</h2>
            <button class="close-btn" onclick="closeModal('editModal')">取消</button>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label class="form-label">SKU 編號</label>
                <input type="text" id="editSKU" class="ios-input" placeholder="SKU">
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">區域</label>
                <input type="text" id="editArea" class="ios-input" placeholder="區域">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">產品名稱 (必填)</label>
            <input type="text" id="editName" class="ios-input" placeholder="請輸入完整名稱">
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">分類</label>
                <select id="editCatSelect" class="ios-select" onchange="checkCustomCat('editCatSelect', 'editCustomCat')">
                    <option value="HAMPER類(cheap餅)">HAMPER(cheap餅)</option>
                    <option value="HAMPER類(朱古力,餅乾)">HAMPER(朱古力)</option>
                    <option value="BB野">BB野</option>
                    <option value="籃">籃</option>
                    <option value="ESG">ESG</option>
                    <option value="酒">酒</option>
                    <option value="果汁">果汁</option>
                    <option value="永生花">永生花</option>
                    <option value="custom">自定義...</option>
                </select>
                <input type="text" id="editCustomCat" class="ios-input" placeholder="輸入新分類" style="display:none; margin-top:8px;">
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">單位</label>
                <select id="editUnitSelect" class="ios-select">
                    <option value="件">件</option>
                    <option value="箱">箱</option>
                    <option value="樽">樽</option>
                    <option value="套">套</option>
                    <option value="其他">其他</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">單價 ($)</label>
            <input type="number" id="editPrice" class="ios-input" placeholder="0" inputmode="decimal">
        </div>
        <button class="action-btn btn-primary" onclick="saveEdit()">儲存修改</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw9zjR7-DOHCzBhHbDM9QhG22nWpozbU2ENjUayX8Y-AdLVXhddIKm-ea8sI3ToLLXs/exec";
    let inventory = JSON.parse(localStorage.getItem('gift_cloud_v2')) || [];
    let editingIndex = -1; 
    
    // 🌟 時空快照：記錄上一次從雲端下載的資料狀態
    let lastCloudSnapshot = localStorage.getItem('cloud_snapshot') || null;
    
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function vibrate() { if(navigator.vibrate) navigator.vibrate(50); }

    let html5QrCode; let isScanning = false; let scanCooldown = false;
    let skuScanner; let isSkuScanning = false; let aiStream = null;

    function renderList() {
        const query = document.getElementById('search').value.toLowerCase();
        const listContainer = document.getElementById('inventoryList');
        listContainer.innerHTML = '';
        let grandTotal = 0;

        inventory.forEach((item, index) => {
            const itemTotal = item.price * item.actualQty;
            grandTotal += itemTotal;

            if (Object.values(item).some(val => String(val).toLowerCase().includes(query))) {
                const card = document.createElement('div');
                card.className = 'ios-card';
                card.id = `row-${index}`;
                
                card.innerHTML = `
                    <div class="item-area-cat">
                        <div class="tag-group">
                            <span class="tag tag-area">${item.area || '未分區'}</span>
                            <span class="tag tag-cat">${item.category}</span>
                        </div>
                    </div>
                    <div class="item-name-sku">
                        <h3 class="item-name">${item.name}</h3>
                        <p class="item-sku">SKU: ${item.sku}</p>
                    </div>
                    <div class="item-price-unit">
                        <span class="price-info">$${item.price} <span class="unit-text">/ ${item.unit}</span></span>
                    </div>
                    <div class="item-total">
                        <span class="total-price-text">總計: $${itemTotal.toLocaleString()}</span>
                    </div>
                    <div class="stepper-container">
                        <div class="stepper">
                            <button class="stepper-btn" onclick="adjust(${index},-1)">−</button>
                            <input type="number" class="qty-input" value="${item.actualQty}" onchange="updateQty(${index}, this.value)">
                            <button class="stepper-btn" onclick="adjust(${index},1)">+</button>
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="edit-btn" onclick="openEdit(${index})" title="修改">✏️</button>
                        <button class="delete-btn" onclick="remove(${index})" title="刪除">✕</button>
                    </div>
                `;
                listContainer.appendChild(card);
            }
        });
        document.getElementById('grandTotal').innerText = `$${grandTotal.toLocaleString()}`;
    }

    // --- 編輯功能 ---
    function openEdit(index) {
        editingIndex = index; const item = inventory[index];
        document.getElementById('editSKU').value = item.sku; document.getElementById('editArea').value = item.area;
        document.getElementById('editName').value = item.name; document.getElementById('editPrice').value = item.price;
        
        const catSelect = document.getElementById('editCatSelect'); const customCatInput = document.getElementById('editCustomCat');
        let catFound = false;
        for(let i=0; i<catSelect.options.length; i++) { if(catSelect.options[i].value === item.category) { catSelect.selectedIndex = i; catFound = true; break; } }
        if(!catFound) { catSelect.value = 'custom'; customCatInput.style.display = 'block'; customCatInput.value = item.category; } else { customCatInput.style.display = 'none'; }

        const unitSelect = document.getElementById('editUnitSelect'); let unitFound = false;
        for(let i=0; i<unitSelect.options.length; i++) { if(unitSelect.options[i].value === item.unit) { unitSelect.selectedIndex = i; unitFound = true; break; } }
        if(!unitFound) unitSelect.value = '其他';

        openModal('editModal');
    }

    function saveEdit() {
        if (editingIndex === -1) return;
        const name = document.getElementById('editName').value; if (!name) return alert("請輸入產品名稱");
        const catSelect = document.getElementById('editCatSelect'); const finalCat = (catSelect.value === 'custom') ? document.getElementById('editCustomCat').value : catSelect.value;

        inventory[editingIndex].sku = document.getElementById('editSKU').value || "N/A";
        inventory[editingIndex].area = document.getElementById('editArea').value || "未指定";
        inventory[editingIndex].name = name; inventory[editingIndex].category = finalCat || "未分類";
        inventory[editingIndex].unit = document.getElementById('editUnitSelect').value;
        inventory[editingIndex].price = parseFloat(document.getElementById('editPrice').value) || 0;

        saveAndRender(); closeModal('editModal'); vibrate();
    }

    function adjust(index, amt) { vibrate(); inventory[index].actualQty = Math.max(0, inventory[index].actualQty + amt); saveAndRender(); }
    function updateQty(index, val) { inventory[index].actualQty = parseInt(val) || 0; saveAndRender(); }
    function remove(index) { if(confirm("確定刪除此品項？")) { inventory.splice(index, 1); saveAndRender(); } }

    function saveAndRender() {
        inventory.sort((a, b) => { if (a.area !== b.area) return a.area.localeCompare(b.area); return (b.price * b.actualQty) - (a.price * a.actualQty); });
        localStorage.setItem('gift_cloud_v2', JSON.stringify(inventory)); renderList();
    }

    function checkCustomCat(selectId, inputId) { document.getElementById(inputId).style.display = (document.getElementById(selectId).value === 'custom') ? 'block' : 'none'; }

    function addItem() {
        const name = document.getElementById('newName').value; if (!name) return alert("請輸入產品名稱");
        const finalCat = (document.getElementById('catSelect').value === 'custom') ? document.getElementById('customCat').value : document.getElementById('catSelect').value;
        inventory.push({ area: document.getElementById('newArea').value || "未指定", category: finalCat || "未分類", sku: document.getElementById('newSKU').value || "N/A", name: name, unit: document.getElementById('unitSelect').value, price: parseFloat(document.getElementById('newPrice').value) || 0, bookQty: parseInt(document.getElementById('newBook').value) || 0, actualQty: parseInt(document.getElementById('newBook').value) || 0 });
        saveAndRender(); closeModal('addModal'); vibrate();
        document.getElementById('newName').value = ''; document.getElementById('newPrice').value = ''; document.getElementById('newSKU').value = ''; document.getElementById('newBook').value = '';
    }

    // --- 相機與AI邏輯 (維持原狀) ---
    function toggleScanner() {
        if (isSkuScanning) toggleSkuScanner(); 
        const readerElement = document.getElementById('reader');
        if (!isScanning) {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 300, height: 150 } }, 
                (decodedText) => {
                    if (scanCooldown) return;
                    const idx = inventory.findIndex(i => i.sku === decodedText.trim());
                    if (idx !== -1) {
                        vibrate(); inventory[idx].actualQty++; saveAndRender(); closeModal('scannerModal'); html5QrCode.stop().then(() => { isScanning = false; html5QrCode = null; });
                        setTimeout(() => { const row = document.getElementById(`row-${idx}`); if(row) { row.scrollIntoView({behavior:'smooth', block:'center'}); row.classList.add('highlight-card'); setTimeout(()=>row.classList.remove('highlight-card'), 1500); } }, 300);
                    } else { scanCooldown = true; alert("找不到條碼: " + decodedText + "\n請使用「手動建檔」。"); setTimeout(() => { scanCooldown = false; }, 2500); }
                }, (errorMessage) => {}
            ).then(() => { isScanning = true; }).catch((err) => { alert("無法開啟相機！"); });
        } else { html5QrCode.stop().then(() => { isScanning = false; html5QrCode = null; }); }
    }

    async function toggleAICamera() {
        const video = document.getElementById('aiVideo');
        if (aiStream) { aiStream.getTracks().forEach(track => track.stop()); aiStream = null; } 
        else { try { aiStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); video.srcObject = aiStream; } catch (err) { alert("無法開啟相機！"); } }
    }

    async function captureAndAnalyze(mode) {
        if(mode === 'count' && inventory.length === 0) { alert("無庫存資料。請先下載或新增！"); return; }
        vibrate();
        const video = document.getElementById('aiVideo'); const canvas = document.getElementById('aiCanvas'); const loading = document.getElementById('aiLoading');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64Image = canvas.toDataURL('image/jpeg', 0.6).split(',')[1]; 

        let promptText = mode === 'count' 
            ? `你是一個專業香港盤點助手。從下方清單找出照片中最符合的產品。\n\n【庫存清單】\n${inventory.map(i => `SKU: ${i.sku} | 名稱: ${i.name}`).join("\n")}\n\n以嚴格 JSON 回覆：\n{"sku": "最匹配SKU或 NEW", "name": "產品名稱", "confidence": "數字0-100", "reason": "簡單說明"}`
            : `你是一個香港建檔助手。觀察照片自動填表。以嚴格 JSON 回覆：\n{"name": "詳細名稱", "category": "最接近類別", "unit": "件/箱/樽/套", "isCustomCategory": true/false}\n類別限選：HAMPER類(cheap餅), HAMPER類(朱古力,餅乾), BB野, 籃, ESG, 酒, 果汁, 永生花。都不像則 isCustomCategory 為 true 並自訂 category。`;

        loading.style.display = "block";
        try {
            const payload = { action: "gemini", prompt: promptText, image: base64Image };
            const response = await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.status === "success" && !result.candidates) throw new Error("GAS 後台版本未更新！");
            if (result.error) throw new Error(result.error.message);

            const aiData = JSON.parse(result.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim());
            loading.style.display = "none";

            if (mode === 'count') {
                if (aiData.sku === "NEW" || aiData.confidence < 50) { alert(`🤖 相似度太低，AI 推測這可能是：\n${aiData.name}\n請改用「智能建檔」。`); } 
                else if(confirm(`✨ 辨識成功！\n\n🎯 ${aiData.name}\n📈 信心：${aiData.confidence}%\n💡 原因：${aiData.reason}\n\n是否數量 +1 ？`)) {
                    const idx = inventory.findIndex(i => i.sku === aiData.sku);
                    if(idx !== -1) { inventory[idx].actualQty++; saveAndRender(); closeModal('aiModal'); toggleAICamera(); setTimeout(() => { const row = document.getElementById(`row-${idx}`); if(row) { row.scrollIntoView({behavior:'smooth', block:'center'}); row.classList.add('highlight-card'); setTimeout(()=>row.classList.remove('highlight-card'), 1500); } }, 300); }
                }
            } else if (mode === 'add') {
                document.getElementById('newName').value = aiData.name;
                const catSelect = document.getElementById('catSelect'); const customCatInput = document.getElementById('customCat');
                if (aiData.isCustomCategory) { catSelect.value = "custom"; customCatInput.style.display = "block"; customCatInput.value = aiData.category; } else { catSelect.value = aiData.category; customCatInput.style.display = "none"; }
                const unitSelect = document.getElementById('unitSelect'); let unitFound = false;
                for(let i=0; i<unitSelect.options.length; i++) { if(unitSelect.options[i].value === aiData.unit) { unitSelect.selectedIndex = i; unitFound = true; break; } }
                if(!unitFound) unitSelect.value = "其他";
                closeModal('aiModal'); toggleAICamera(); openModal('addModal');
                alert(`✅ AI 已填寫名稱與類別：\n${aiData.name}\n請補齊單價後加入清單。`);
            }
        } catch (error) { loading.style.display = "none"; alert("AI 錯誤：" + error.message); }
    }

    function toggleSkuScanner() {
        const skuReaderElement = document.getElementById('skuReader');
        if (!isSkuScanning) {
            skuScanner = new Html5Qrcode("skuReader"); skuReaderElement.style.display = "block";
            skuScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 100 } }, 
                (decodedText) => { vibrate(); document.getElementById('newSKU').value = decodedText.trim(); skuScanner.stop().then(() => { isSkuScanning = false; skuScanner = null; skuReaderElement.style.display = "none"; }); }, (errorMessage) => {}
            ).then(() => { isSkuScanning = true; }).catch((err) => { alert("相機錯誤！"); });
        } else { skuScanner.stop().then(() => { isSkuScanning = false; skuScanner = null; skuReaderElement.style.display = "none"; }); }
    }

    // ==========================================
    // 🛡️ 雲端同步與防呆機制
    // ==========================================
    async function downloadFromCloud() {
        document.getElementById('syncStatus').innerText = "下載中...";
        try {
            const response = await fetch(GAS_URL); 
            const data = await response.json();
            if (data && data.length > 0) { 
                inventory = data; 
                saveAndRender(); 
                
                // 🌟 拍下時空快照，記錄下載時的雲端狀態
                lastCloudSnapshot = JSON.stringify(data);
                localStorage.setItem('cloud_snapshot', lastCloudSnapshot);
                
                document.getElementById('syncStatus').innerText = "✅ 下載成功 " + new Date().toLocaleTimeString().slice(0,5); 
            } else { 
                document.getElementById('syncStatus').innerText = "雲端無資料"; 
            }
        } catch (error) { 
            document.getElementById('syncStatus').innerText = "❌ 下載失敗"; 
        }
    }

    async function uploadToCloud() {
        document.getElementById('syncStatus').innerText = "檢查衝突中...";
        try {
            // 🛡️ 防呆第一步：先偷偷下載最新的雲端資料來比對
            const checkResp = await fetch(GAS_URL);
            const latestCloudData = await checkResp.json();
            
            // 🛡️ 防呆第二步：比對「現在的雲端」跟「我當初下載的雲端(快照)」一不一樣
            if (lastCloudSnapshot && JSON.stringify(latestCloudData) !== lastCloudSnapshot) {
                const force = confirm("⚠️ 衝突警告！⚠️\n\n在你盤點期間，其他同事已經上傳了新資料。\n\n[確定]：強制用你的資料覆蓋雲端 (會覆蓋同事進度)\n[取消]：中止上傳，請先匯出 Excel 備份再處理。");
                if (!force) {
                    document.getElementById('syncStatus').innerText = "❌ 已取消 (防呆保護)";
                    return; // 中止上傳
                }
            }

            document.getElementById('syncStatus').innerText = "上傳中...";
            // 正式上傳
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(inventory) });
            
            // 🌟 上傳成功後，更新自己的快照
            lastCloudSnapshot = JSON.stringify(inventory);
            localStorage.setItem('cloud_snapshot', lastCloudSnapshot);
            
            document.getElementById('syncStatus').innerText = "✅ 已上傳 " + new Date().toLocaleTimeString().slice(0,5);
        } catch (error) { 
            document.getElementById('syncStatus').innerText = "❌ 上傳失敗"; 
        }
    }

   function exportToExcel() {
        // 1. 加入報表標題與精確時間戳記
        const now = new Date();
        const timestamp = now.toLocaleString('zh-HK');
        let csv = `\uFEFF"🏢 禮品資產盤點總表","匯出時間：${timestamp}"\n\n`;

        // 2. 乾淨純粹的表頭
        csv += "區域,分類,SKU,產品名稱,單位,單價,實盤數量,💰實盤總值\n";

        let grandTotalValue = 0;

        // 3. 填入資料並計算實盤總值
        inventory.forEach(i => {
            const actualValue = i.price * i.actualQty;
            grandTotalValue += actualValue;

            // 防止產品名稱裡面有雙引號或逗號導致 CSV 跑位
            const safeName = i.name.replace(/"/g, '""');

            // 💡 解決魔法就在這裡：把 SKU 欄位用 =" " 包裝起來，強迫 Excel 認作純文字
            csv += `"${i.area}","${i.category}","=""${i.sku}""","${safeName}","${i.unit}",${i.price},${i.actualQty},${actualValue}\n`;
        });

        // 4. 底部加上強大的「總計列」
        csv += `\n"📊 總計","","","","","","",${grandTotalValue}\n`;

        // 5. 匯出檔案
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `GGB Stocktake 31 Mar_${now.toISOString().slice(0,10)}.csv`;
        link.click();
    }
    function confirmClear() { if(confirm("確定清空手機上的所有資料？")) { inventory=[]; localStorage.removeItem('cloud_snapshot'); saveAndRender(); } }

    renderList();
</script>
